<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - StepStyle</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
<body>

    <header>
        <nav>
            <div class="logo">StepStyle</div>
            <ul class="nav-links">

                <li><a href="index.html">Home</a></li>

                <li><a href="shop.html">Shop</a></li>

                <li><a href="gallery.html">Gallery</a></li>

                <li><a href="about.html">About Us</a></li>

                <li><a href="contact.html">Contact</a></li>

                <li><a href="cart.html">Cart <span id="cart-count">0</span></a></li>

                <li><a href="offers.html">Offers</a></li>

                <li><a href="size-guide.html">Size Guide</a></li>
            </ul>
            <button id="theme-toggle" class="theme-toggle"><i class="fas fa-moon"></i></button>
        </nav>
    </header>

    <main>
        <section class="gallery">
            <h1>Product Gallery</h1>
            <div class="gallery-grid">

                <img src="images/Nike-Air-Max.avif" alt="Nike Sneakers" class="gallery-item">

                <img src="images/adidas-run.avif" alt="Adidas Shoes" class="gallery-item">

                <img src="images/puma.avif" alt="Puma Sneakers" class="gallery-item">

                <img src="images/Reeboook.avif" alt="Reebok Classic" class="gallery-item">

                <img src="images/new-balance.avif" alt="New Balance Sneakers" class="gallery-item">

                <img src="images/converse.avif" alt="Converse All Star" class="gallery-item">

                <img src="images/jordan.jpg" alt="Jordan Sneakers" class="gallery-item">

                <img src="images/jordan1.avif" alt="Jordan Sneakers" class="gallery-item">

                <img src="images/vans shoes.avif" alt="Vans Shoes" class="gallery-item">
            </div>
        </section>

        <div id="lightbox" class="lightbox">
            <span class="close">&times;</span>

            <img class="lightbox-content" id="lightbox-img">
        </div>
    </main>

    <footer>

        <div class="footer-content">

            <div class="footer-logo">StepStyle</div>

            <div class="footer-info">
                <p>Kathmandu, Nepal</p>
                <p><a href="mailto:hello@stepstyle.com">hello@stepstyle.com</a></p>
            </div>
        </div>
    </footer>
    <script src="script.js"></script>

</body>
</html>
